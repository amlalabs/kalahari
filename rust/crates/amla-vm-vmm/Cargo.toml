[package]
name = "amla-vm-vmm"
description = "Ergonomic VMM API with typestate-enforced lifecycle"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "amla_vmm"

[features]
default = []
usernet = ["dep:amla-vm-usernet"]
subprocess = ["amla-vm-kvm/subprocess"]

[dependencies]
amla-vm-usernet = { workspace = true, optional = true }
amla-vm-core.workspace = true
amla-vm-fuse.workspace = true
amla-vm-virtio.workspace = true
amla-vm-virtio-mmio.workspace = true
amla-vm-virtio-console.workspace = true
amla-vm-virtio-fs.workspace = true
amla-vm-virtio-net.workspace = true
amla-vm-virtio-pmem.workspace = true
amla-vm-virtio-rng.workspace = true
amla-vm-erofs.workspace = true
amla-vm-mem.workspace = true
amla-vm-constants.workspace = true
amla-vm-ringbuf.workspace = true
futures-util = { workspace = true, features = ["alloc"] }
parking_lot.workspace = true
thiserror.workspace = true
log.workspace = true
serde = { workspace = true, features = ["derive"] }
postcard.workspace = true
tokio = { workspace = true, features = ["sync", "rt", "io-util", "time"] }
tokio-util.workspace = true
amla-vm-boot.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
amla-vm-kvm.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
amla-vm-hvf.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
amla-vm-hyperv.workspace = true

[target.'cfg(not(any(target_os = "linux", target_os = "macos", target_os = "windows")))'.dependencies]
amla-vm-stub.workspace = true

[dev-dependencies]
http.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
amla-vm-guest-rootfs = { workspace = true, features = ["test-binaries"] }
amla-vm-usernet.workspace = true
amla-vm-tls-proxy-net.workspace = true
amla-vm-interceptor.workspace = true
amla-vm-policy-net.workspace = true
amla-vm-constants.workspace = true
rustls.workspace = true
env_logger.workspace = true
dirs.workspace = true
tempfile.workspace = true
criterion = { workspace = true, features = ["html_reports", "async_tokio"] }
tabled.workspace = true
trybuild.workspace = true

[target.'cfg(target_os = "macos")'.dev-dependencies]
amla-vm-guest-rootfs = { workspace = true, features = ["test-binaries"] }

[[bench]]
name = "vmm_latency"
harness = false

[[bench]]
name = "vmm_throughput"
harness = false

[[bench]]
name = "vmm_ringbuf"
harness = false

[[bin]]
name = "amla-kvm-worker"
path = "src/bin/amla-kvm-worker.rs"

[lints]
workspace = true


[[example]]
name = "test_fresh_vms"
